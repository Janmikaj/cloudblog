---
- name: Install Apache, Node.js, and PM2
  hosts: all
  become: yes
  tasks:
    - name: Update yum packages
      yum:
        name: "*"
        state: latest

    - name: Install Apache
      yum:
        name: httpd
        state: present

    - name: Start and enable Apache
      service:
        name: httpd
        state: started
        enabled: yes

    - name: Install Node.js
      shell: |
        curl -sL https://rpm.nodesource.com/setup_16.x | bash -
        yum install -y nodejs

    - name: Install PM2 globally
      npm:
        name: pm2
        global: yes
