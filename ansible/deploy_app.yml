---
- name: Deploy Frontend and Backend
  hosts: all
  become: yes
  tasks:
    - name: Ensure /var/www/html/ is empty
      file:
        path: /var/www/html/
        state: directory
        mode: '0755'

    - name: Copy frontend build to Apache
      copy:
        src: ../app/
        dest: /var/www/html/
        owner: apache
        group: apache
        mode: '0644'

    - name: Create backend directory
      file:
        path: /home/ec2-user/backend
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Copy backend files
      copy:
        src: ../backend-secure/
        dest: /home/ec2-user/backend/
        owner: ec2-user
        group: ec2-user

    - name: Install backend dependencies
      npm:
        path: /home/ec2-user/backend/

    - name: Start backend with PM2
      become_user: ec2-user
      shell: |
        cd /home/ec2-user/backend/
        pm2 delete all || true
        pm2 start server.js --name "backend"
        pm2 save
